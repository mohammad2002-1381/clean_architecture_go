definitions:
  go-ca_internal_app_productapp.CreateItemCommand:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  go-ca_internal_app_productapp.CreateProductCommand:
    properties:
      description:
        type: string
      items:
        items:
          $ref: '#/definitions/go-ca_internal_app_productapp.CreateItemCommand'
        type: array
      name:
        type: string
      price:
        type: number
    type: object
  go-ca_internal_app_productapp.ItemDto:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      product:
        $ref: '#/definitions/go-ca_internal_app_productapp.ProductDTO'
      updated_at:
        type: string
    type: object
  go-ca_internal_app_productapp.ProductDTO:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/go-ca_internal_app_productapp.ItemDto'
        type: array
      name:
        type: string
      price:
        type: number
