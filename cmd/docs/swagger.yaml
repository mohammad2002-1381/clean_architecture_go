        type: number
    type: object
  go-ca_internal_app_userapp.AuthDTO:
    properties:
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/go-ca_internal_app_userapp.UserDTO'
    type: object
  go-ca_internal_app_userapp.LoginUserCommand:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  go-ca_internal_app_userapp.RefreshTokenCommand:
    properties:
      refresh_token:
        type: string
    type: object
  go-ca_internal_app_userapp.RegisterUserCommand:
    properties:
      email:
        type: string
      first_name:
